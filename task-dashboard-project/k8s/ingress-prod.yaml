apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-dashboard-ingress
  namespace: prod
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: task-dashboard-service
                port:
                  number: 80
