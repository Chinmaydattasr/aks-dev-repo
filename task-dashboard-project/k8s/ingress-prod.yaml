apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress-dev
  namespace: prod
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
    - host: prod.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 80
