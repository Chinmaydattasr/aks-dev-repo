trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  acrName: CRDatta
  acrLoginServer: crdatta-dvf9e0a8eqeegng0.azurecr.io
  imageName: task-dashboard-app
  tag: $(Build.BuildId)
  aksRg: DevOps-RG-Datta
  aksName: aks-demo

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildPush
    displayName: Build Docker Image and Push to ACR
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build and Push Docker Image
      inputs:
        azureSubscription: Devops-ser-conn
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          cd task-dashboard-project
          az acr login --name $(acrName)
          docker build -t $(acrLoginServer)/$(imageName):$(tag) .
          docker push $(acrLoginServer)/$(imageName):$(tag)

- stage: DeployDev
  displayName: Deploy to Dev
  dependsOn: Build
  jobs:
  - deployment: DeployToDev
    displayName: Deploy Application to Dev Namespace
    environment: aks-dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Deploy to AKS Dev
            inputs:
              azureSubscription: Devops-ser-conn
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials --resource-group $(aksRg) --name $(aksName) --overwrite-existing
                kubectl apply -f task-dashboard-project/k8s/pvc-dev.yaml
                kubectl apply -f task-dashboard-project/k8s/deployment-dev.yaml
                kubectl apply -f task-dashboard-project/k8s/service.yaml
                kubectl apply -f task-dashboard-project/k8s/ingress-dev.yaml
                kubectl set image deployment/task-dashboard task-dashboard=$(acrLoginServer)/$(imageName):$(tag) -n dev

- stage: DeployProd
  displayName: Deploy to Prod
  dependsOn: DeployDev
  jobs:
  - deployment: DeployToProd
    displayName: Deploy Application to Prod Namespace
    environment: aks-prod
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Deploy to AKS Prod
            inputs:
              azureSubscription: Devops-ser-conn
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials --resource-group $(aksRg) --name $(aksName) --overwrite-existing
                kubectl apply -f task-dashboard-project/k8s/pvc-prod.yaml
                kubectl apply -f task-dashboard-project/k8s/deployment-prod.yaml
                kubectl apply -f task-dashboard-project/k8s/service-prod.yaml
                kubectl apply -f task-dashboard-project/k8s/ingress-prod.yaml
                kubectl set image deployment/task-dashboard task-dashboard=$(acrLoginServer)/$(imageName):$(tag) -n prod
